events {}
http {
    upstream python {
        server python:8000;
    }
    server {
        listen 8000;
        server_name python;

        location / {
            proxy_pass http://python;
        }
    }
    
    upstream ollama {
        server ollama:11434;
    }
    server {
        listen 11434;
        server_name ollama;

        location / {
            proxy_pass http://ollama;
        }
    }
}
