services:
  ollama:
    # image: ollama/ollama:rocm
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - 11434:11434
    networks:
      - internal_network

  python:
    build:
      dockerfile: dockerfile_python
    volumes:
      - .:/home
    ports:
      - 8000:8000
    networks:
      - internal_network
    depends_on:
      - ollama
    tty: true
    stdin_open: true

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - 8000:8000
      - 11434:11434
    networks:
      - internal_network
      - internet_access
    depends_on:
      - python

volumes:
  ollama:

networks:
  internal_network:
    internal: true
  internet_access:
